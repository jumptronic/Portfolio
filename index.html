<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jess Heitland — Creative Director</title>
  <meta name="description" content="Jess Heitland is a Creative Director based in Saint Paul, MN.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,900;1,9..144,900&family=Martian+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0D0D;
      --ink: #EDEAE4;
      --ink-mid: #888480;
      --ink-dim: #3E3C3A;
      --accent: #E8FF47;
      --rule: rgba(255,255,255,0.07);
    }

    html, body {
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      font-family: 'Martian Mono', monospace;
      overflow-x: hidden;
    }

    body {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 100vh;
      padding: 2.5rem 3rem;
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 0 2rem;
    }

    /* LOCKUP */
    .lockup {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 3rem;
      opacity: 0;
      animation: up 0.6s 0.1s ease forwards;
    }

    .lockup-name {
      font-family: 'Martian Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mid);
      line-height: 1;
    }

    .lockup-rule {
      width: 1px;
      height: 0.8em;
      background: var(--ink-dim);
      display: inline-block;
      vertical-align: middle;
    }

    .lockup-title {
      font-family: 'Martian Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-dim);
      line-height: 1;
    }

    /* HEADLINE */
    .headline {
      opacity: 0;
      animation: up 0.7s 0.25s ease forwards;
      margin-bottom: 3.5rem;
      max-width: 100%;
      padding-left: 0.15em;
    }

    .hed-line {
      display: block;
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 14vw, 7.75rem);
      font-weight: 900;
      font-style: italic;
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: var(--ink);
      white-space: normal;
      word-break: normal;
      max-width: 100%;
    }

    .hed-line.accent {
      animation: shift 20s ease-in-out infinite;
    }

    @keyframes shift {
      0%   { color: #E8FF47; }
      20%  { color: #D6F73A; }
      45%  { color: #C8FF00; }
      55%  { color: #00FFC8; }
      65%  { color: #FF2DF7; }
      72%  { color: #00F0FF; }
      82%  { color: #CCFF33; }
      100% { color: #E8FF47; }
    }

    .hed-nowrap {
      white-space: nowrap;
    }

    /* BODY */
    .body-text {
      font-family: 'Martian Mono', monospace;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 2;
      color: var(--ink-mid);
      width: 100%;
      opacity: 0;
      animation: up 0.6s 0.45s ease forwards;
    }

    .links {
      display: flex;
      gap: 2rem;
      margin-top: 2.5rem;
      opacity: 0;
      animation: up 0.6s 0.6s ease forwards;
    }

    .links a {
      font-family: 'Martian Mono', monospace;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-mid);
      text-decoration: none;
      position: relative;
      padding-bottom: 3px;
      transition: color 0.15s, background 0.15s;
      border-radius: 1px;
    }

    .links a:hover {
      color: var(--bg);
      background: var(--accent);
      padding: 0 4px;
      margin: 0 -4px;
    }

    /* FOOTER */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 2rem;
      border-top: 1px solid var(--rule);
      opacity: 0;
      animation: up 0.6s 0.75s ease forwards;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Martian Mono', monospace;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #6BBF5E;
      flex-shrink: 0;
      animation: pulse 3s ease-in-out infinite;
    }

    .footer-right {
      font-family: 'Martian Mono', monospace;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      body { padding: 1.25rem; }
      .hed-nowrap { white-space: normal; }
      .links { flex-direction: column; gap: 1rem; }
      footer { flex-direction: column; gap: 1rem; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <main>

    <div class="lockup">
      <span class="lockup-name">Jess Heitland</span>
      <span class="lockup-rule"></span>
      <span class="lockup-title">Creative Director</span>
    </div>

    <div class="headline">
      <span class="hed-line">This placeholder</span>
      <span class="hed-line accent hed-nowrap">is fine.</span>
    </div>

    <p class="body-text">Creative director with 20 years in loyalty marketing, brand identity, and digital experience. Portfolio launching soon.</p>

    <nav class="links">
      <a href="mailto:jumptronic@gmail.com">Email</a>
      <a href="https://www.linkedin.com/in/jheitland/" target="_blank" rel="noopener">LinkedIn</a>
    </nav>

  </main>

  <footer>
    <div class="footer-left">
      <span class="dot"></span>
      Saint Paul, MN
    </div>
    <span class="footer-right">More soon</span>
  </footer>

</body>
</html>
